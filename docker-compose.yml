services:
  db:
    image: postgres:14-alpine
    container_name: interact_postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: interact_backend:latest
    container_name: interact_backend
    env_file: .env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - backend_network

  nginx:
    image: nginx:latest
    container_name: interact_nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - backend_network
    volumes:
      # Монтируем ОДИН конфиг. 
      # На сервере это должен быть prod.conf (с SSL), на Mac — dev.conf (без SSL)
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      # Если вы на сервере, раскомментируйте строку ниже:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: always

  # telegram_bot:
  #   build:
  #     context: .
  #     dockerfile: ./telegram_bot/Dockerfile
  #   container_name: interact_telegram_bot
  #   restart: always
  #   env_file: .env
  #   depends_on:
  #     - backend
  #   networks:
  #     - backend_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  backend_network:
    driver: bridge