<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interact Club | Кабинет Президента</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00c6ff; --bg: #020408; --glass: rgba(15, 23, 42, 0.95); }
        body { 
            background: var(--bg); color: white; font-family: 'Inter', sans-serif; 
            background-image: radial-gradient(circle at 50% 0%, #10192e 0%, #020408 100%); 
            min-height: 100vh; overflow-x: hidden;
        }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        
        .sidebar { width: 280px; background: rgba(11, 17, 33, 0.95); border-right: 1px solid rgba(255,255,255,0.05); }
        .side-btn { 
            width: 100%; text-align: left; padding: 16px 20px; font-weight: 800; text-transform: uppercase; 
            font-size: 12px; letter-spacing: 0.05em; border-radius: 16px; transition: all 0.3s; 
            color: #64748b; display: flex; align-items: center; gap: 16px; margin-bottom: 8px;
        }
        .side-btn:hover:not(.active) { color: white; background: rgba(255,255,255,0.05); }
        .side-btn.active { background: rgba(0, 198, 255, 0.1); color: var(--primary); border: 1px solid rgba(0, 198, 255, 0.3); }
        
        .app-card { 
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 20px; transition: all 0.3s ease; cursor: pointer; position: relative;
        }
        .app-card:hover { border-color: var(--primary); transform: translateY(-4px); box-shadow: 0 10px 30px -10px rgba(0, 198, 255, 0.15); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="toast-container" class="fixed top-5 right-5 z-[3000] flex flex-col gap-3"></div>

    <aside class="sidebar h-full flex flex-col hidden md:flex flex-shrink-0 relative z-50">
        <div class="p-8 border-b border-white/5">
            <h2 class="text-2xl font-black italic uppercase text-white leading-none">Pres<span class="text-primary">Panel</span></h2>
            <p id="userNameLabel" class="text-xs text-gray-400 mt-2 font-semibold">Загрузка...</p>
        </div>
        <nav class="flex-1 p-6 overflow-y-auto">
            <button onclick="switchTab('commands')" id="tab-commands" class="side-btn active">
                <i class="fas fa-users w-5"></i> Команды
            </button>
            <button onclick="switchTab('board')" id="tab-board" class="side-btn">
                <i class="fas fa-user-tie w-5"></i> Борд
            </button>
        </nav>
        <div class="p-6 border-t border-white/5">
            <button onclick="logout()" class="w-full py-3 rounded-xl bg-red-500/10 text-red-500 font-bold uppercase text-xs hover:bg-red-500 hover:text-white transition">
                <i class="fas fa-power-off mr-2"></i>Выйти
            </button>
        </div>
    </aside>

    <main class="flex-1 h-full overflow-y-auto p-6 md:p-10 relative">
        <header class="mb-8 glass-card p-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                <h1 id="pageTitle" class="text-2xl md:text-3xl font-black uppercase italic tracking-wide">Набор в команды</h1>
                
                <div class="flex flex-col md:flex-row gap-4 w-full md:w-auto">
                    <div class="relative w-full md:w-64">
                        <select id="itemFilter" onchange="applyFilter(this.value)" class="w-full bg-black/40 border border-white/10 rounded-lg pl-4 pr-10 py-2.5 text-xs font-bold uppercase tracking-wider text-white focus:outline-none focus:border-primary appearance-none cursor-pointer">
                            <option value="all">⚡ Все направления</option>
                        </select>
                        <i class="fas fa-chevron-down absolute right-4 top-1/2 transform -translate-y-1/2 text-primary text-xs pointer-events-none"></i>
                    </div>

                    <div class="flex bg-black/40 rounded-lg p-1 border border-white/10 shrink-0">
                        <button onclick="switchStatus('pending')" id="status-pending" class="px-4 py-2 rounded-md text-xs font-bold uppercase bg-primary text-black transition">Ожидают</button>
                        <button onclick="switchStatus('accepted')" id="status-accepted" class="px-4 py-2 rounded-md text-xs font-bold uppercase text-gray-400 hover:text-white transition">Принятые</button>
                    </div>
                </div>
            </div>
        </header>

        <section id="sec-commands" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 text-gray-500"><i class="fas fa-circle-notch fa-spin text-3xl"></i></div>
        </section>

        <section id="sec-board" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 hidden">
            <div class="col-span-full text-center py-20 text-gray-500"><i class="fas fa-circle-notch fa-spin text-3xl"></i></div>
        </section>
    </main>

    <div id="appModal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[2000] hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="glass-card w-full max-w-2xl max-h-[90vh] flex flex-col relative transform scale-95 transition-transform duration-300" id="appModalInner">
            
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-white text-xl z-10"><i class="fas fa-times"></i></button>
            
            <div class="p-8 border-b border-white/10 shrink-0">
                <div class="text-[10px] font-black text-primary uppercase tracking-widest mb-1" id="modalBadge">Команда / Борд</div>
                <h3 class="text-3xl font-black uppercase italic text-white leading-tight" id="modalName">Имя Кандидата</h3>
                <p class="text-sm text-gray-400 mt-2" id="modalContact"></p>
            </div>
            
            <div class="p-8 overflow-y-auto flex-1 custom-scrollbar" id="modalAnswers">
                <!-- Ответы будут сгенерированы через JS -->
            </div>
            
            <div class="p-6 border-t border-white/10 shrink-0 bg-black/20 rounded-b-3xl flex gap-4">
                <button id="btnAccept" onclick="acceptCurrentApplication()" class="flex-1 py-4 rounded-xl bg-primary text-black font-black uppercase tracking-wide hover:bg-white transition shadow-[0_0_20px_rgba(0,198,255,0.2)]">
                    <i class="fas fa-check-double mr-2"></i> Принять кандидата
                </button>
            </div>
        </div>
    </div>

    <script>
        // ВНИМАНИЕ: Если в основном файле urls.py твоего проекта есть префикс '/api/' (например path('api/', include('your_app.urls'))), 
        // то добавь '/api' перед путями ниже. Если нет, оставь как есть.
        const API = {
            profile: '/profile/', // Убедись, что этот путь существует в твоем Django
            commandsApps: '/commands-applications/',
            boardApps: '/board-applications/'
        };

        let state = {
            token: localStorage.getItem('access'),
            activeTab: 'commands',
            activeStatus: 'pending',
            filterValue: 'all',
            commandsData: [],
            boardData: [],
            currentApp: null 
        };

        async function init() {
            if (!state.token) { location.href = '/login/'; return; } // Редирект на логин, если нет токена
            
            // Получение профиля (если эндпоинт отсутствует, закомментируй этот блок и оставь только fetchData)
            try {
                const res = await fetch(API.profile, { headers: { 'Authorization': `Bearer ${state.token}` } });
                if (res.ok) {
                    const user = await res.json();
                    document.getElementById('userNameLabel').innerText = `${user.first_name || user.username || 'Админ'} (${user.role || 'Президент'})`;
                }
            } catch (e) {
                console.warn("Не удалось загрузить профиль");
            }
            
            await fetchData();
        }

        async function fetchData() {
            const h = { 'Authorization': `Bearer ${state.token}` };
            try {
                const [cmdRes, boardRes] = await Promise.all([
                    fetch(API.commandsApps + '?limit=1000', { headers: h }),
                    fetch(API.boardApps + '?limit=1000', { headers: h })
                ]);

                // Проверка на ошибки авторизации
                if (cmdRes.status === 401 || boardRes.status === 401) {
                    logout();
                    return;
                }

                const cmdData = await cmdRes.json();
                const boardData = await boardRes.json();

                // Обработка данных из DRF (может быть массив или объект с .results при пагинации)
                state.commandsData = Array.isArray(cmdData) ? cmdData : (cmdData.results || []);
                state.boardData = Array.isArray(boardData) ? boardData : (boardData.results || []);

                updateFilterDropdown();
                renderViews();
            } catch (e) {
                showToast("Ошибка загрузки заявок. Проверьте соединение.", "error");
                console.error(e);
            }
        }

        function updateFilterDropdown() {
            const select = document.getElementById('itemFilter');
            let options = `<option value="all">⚡ Все направления</option>`;
            
            const apps = state.activeTab === 'commands' ? state.commandsData : state.boardData;
            const key = state.activeTab === 'commands' ? 'command_title' : 'board_title';
            
            const uniqueTitles = [...new Set(apps.map(a => a[key]).filter(Boolean))];
            
            uniqueTitles.forEach(title => {
                options += `<option value="${title}">${title}</option>`;
            });
            
            select.innerHTML = options;
            
            if (uniqueTitles.includes(state.filterValue)) {
                select.value = state.filterValue;
            } else {
                state.filterValue = 'all';
                select.value = 'all';
            }
        }

        function applyFilter(value) {
            state.filterValue = value;
            renderViews();
        }

        function renderViews() {
            renderCommands();
            renderBoard();
        }

        function extractName(app, isBoard) {
            if (isBoard) return app.applicant_name || 'Без имени';
            if (app.answers) {
                const vals = Object.values(app.answers);
                if (vals.length > 0) return String(vals[0]); 
            }
            return 'Неизвестный волонтер';
        }

        function renderCommands() {
            const container = document.getElementById('sec-commands');
            const filtered = state.commandsData.filter(a => {
                const statusMatch = (a.status || 'pending').toLowerCase() === state.activeStatus;
                const filterMatch = state.filterValue === 'all' || a.command_title === state.filterValue;
                return statusMatch && filterMatch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center text-gray-500 font-bold uppercase text-sm border-2 border-dashed border-white/10 rounded-2xl">Нет заявок по текущему фильтру</div>`;
                return;
            }

            container.innerHTML = filtered.map((app) => {
                const name = extractName(app, false);
                const realIndex = state.commandsData.findIndex(a => a.id === app.id);
                
                return `
                <div class="app-card p-6" onclick="openModal('commands', ${realIndex})">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[9px] font-black uppercase px-2 py-1 bg-white/10 text-white rounded">${app.command_title || 'Команда'}</span>
                        <span class="text-[10px] text-gray-500">${new Date(app.created_at).toLocaleDateString()}</span>
                    </div>
                    <h4 class="text-xl font-bold text-white mb-2 line-clamp-1">${name}</h4>
                    <p class="text-xs text-gray-400 italic line-clamp-2">Нажмите, чтобы просмотреть анкету...</p>
                </div>
                `;
            }).join('');
        }

        function renderBoard() {
            const container = document.getElementById('sec-board');
            const filtered = state.boardData.filter(a => {
                const statusMatch = (a.status || 'pending').toLowerCase() === state.activeStatus;
                const filterMatch = state.filterValue === 'all' || a.board_title === state.filterValue;
                return statusMatch && filterMatch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center text-gray-500 font-bold uppercase text-sm border-2 border-dashed border-white/10 rounded-2xl">Нет заявок по текущему фильтру</div>`;
                return;
            }

            container.innerHTML = filtered.map((app) => {
                const realIndex = state.boardData.findIndex(a => a.id === app.id);
                return `
                <div class="app-card p-6 border-l-4 border-l-primary" onclick="openModal('board', ${realIndex})">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[9px] font-black uppercase px-2 py-1 bg-primary/20 text-primary rounded">${app.board_title || 'Позиция'}</span>
                        <span class="text-[10px] text-gray-500">${new Date(app.created_at).toLocaleDateString()}</span>
                    </div>
                    <h4 class="text-xl font-bold text-white mb-1 line-clamp-1">${app.applicant_name || 'Без имени'}</h4>
                    <p class="text-xs text-gray-400"><i class="fas fa-phone mr-1"></i> ${app.applicant_phone || 'Нет номера'}</p>
                </div>
                `;
            }).join('');
        }

        function openModal(type, index) {
            const isBoard = (type === 'board');
            state.currentApp = isBoard ? state.boardData[index] : state.commandsData[index];
            state.currentApp.isBoard = isBoard; 

            const app = state.currentApp;
            const name = extractName(app, isBoard);
            const contactInfo = isBoard ? `<i class="fas fa-phone mr-1"></i> ${app.applicant_phone || 'Нет данных'}` : 'Данные из анкеты';

            document.getElementById('modalBadge').innerText = isBoard ? 'Позиция в Борде: ' + (app.board_title || '') : 'Проект / Команда: ' + (app.command_title || '');
            document.getElementById('modalName').innerText = name;
            document.getElementById('modalContact').innerHTML = contactInfo;

            let answersHtml = '';
            if (app.answers && Object.keys(app.answers).length > 0) {
                for (const [question, answer] of Object.entries(app.answers)) {
                    answersHtml += `
                    <div class="mb-5">
                        <p class="text-xs text-primary font-bold uppercase mb-1">${question.replace('q_', 'Вопрос ')}</p>
                        <div class="bg-white/5 p-4 rounded-xl text-sm text-gray-200 border border-white/5">${answer || '—'}</div>
                    </div>`;
                }
            } else {
                answersHtml = '<p class="text-gray-500 text-sm italic">Текстовые ответы отсутствуют.</p>';
            }

            if (app.files && app.files.length > 0) {
                answersHtml += `<h4 class="text-xs font-black text-gray-500 uppercase mt-8 mb-4 border-t border-white/10 pt-4">Прикрепленные файлы</h4>`;
                app.files.forEach(f => {
                    answersHtml += `
                    <a href="${f.file}" target="_blank" class="flex items-center gap-3 p-3 bg-white/5 rounded-xl hover:bg-white/10 transition mb-2 border border-white/5">
                        <div class="w-10 h-10 rounded bg-primary/20 text-primary flex items-center justify-center"><i class="fas fa-file"></i></div>
                        <div>
                            <p class="text-sm font-bold text-white">${f.label || 'Документ'}</p>
                            <p class="text-[10px] text-gray-400 uppercase">Нажмите для просмотра</p>
                        </div>
                    </a>`;
                });
            }

            document.getElementById('modalAnswers').innerHTML = answersHtml;

            const btn = document.getElementById('btnAccept');
            if ((app.status || '').toLowerCase() === 'accepted') {
                btn.innerHTML = '<i class="fas fa-check"></i> Уже в составе';
                btn.className = "flex-1 py-4 rounded-xl bg-green-500/20 text-green-400 font-black uppercase cursor-not-allowed";
                btn.disabled = true;
            } else {
                btn.innerHTML = '<i class="fas fa-check-double mr-2"></i> Принять кандидата';
                btn.className = "flex-1 py-4 rounded-xl bg-primary text-black font-black uppercase tracking-wide hover:bg-white transition shadow-[0_0_20px_rgba(0,198,255,0.2)]";
                btn.disabled = false;
            }

            const modal = document.getElementById('appModal');
            const inner = document.getElementById('appModalInner');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                inner.classList.remove('scale-95');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('appModal');
            const inner = document.getElementById('appModalInner');
            modal.classList.add('opacity-0');
            inner.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                state.currentApp = null;
            }, 300); 
        }

        async function acceptCurrentApplication() {
            if (!state.currentApp) return;
            
            const btn = document.getElementById('btnAccept');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Обработка...';
            btn.disabled = true;

            const app = state.currentApp;
            const endpoint = app.isBoard ? API.boardApps : API.commandsApps;
            
            // Если в API путях нет слеша в конце, добавляем его безопасно
            const basePath = endpoint.endsWith('/') ? endpoint : endpoint + '/';
            const url = `${basePath}${app.id}/accept/`;

            try {
                const res = await fetch(url, {
                    method: 'PATCH',
                    headers: { 
                        'Authorization': `Bearer ${state.token}`, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ status: 'accepted' })
                });

                if (res.ok) {
                    showToast("Успешно принято!", "success");
                    closeModal();
                    await fetchData(); 
                } else {
                    const data = await res.json();
                    showToast(data.error || "Ошибка сервера при обновлении статуса", "error");
                    closeModal();
                }
            } catch (e) {
                showToast("Ошибка сети", "error");
                closeModal();
            }
        }

        function switchTab(tab) {
            state.activeTab = tab;
            state.filterValue = 'all';
            
            document.getElementById('tab-commands').classList.toggle('active', tab === 'commands');
            document.getElementById('tab-board').classList.toggle('active', tab === 'board');
            
            document.getElementById('sec-commands').classList.toggle('hidden', tab !== 'commands');
            document.getElementById('sec-board').classList.toggle('hidden', tab !== 'board');
            
            document.getElementById('pageTitle').innerText = tab === 'commands' ? 'Набор в команды' : 'Набор в Борд';
            
            updateFilterDropdown();
            renderViews();
        }

        function switchStatus(status) {
            state.activeStatus = status;
            
            const btnP = document.getElementById('status-pending');
            const btnA = document.getElementById('status-accepted');

            if (status === 'pending') {
                btnP.className = "px-4 py-2 rounded-md text-xs font-bold uppercase bg-primary text-black transition";
                btnA.className = "px-4 py-2 rounded-md text-xs font-bold uppercase text-gray-400 hover:text-white transition";
            } else {
                btnA.className = "px-4 py-2 rounded-md text-xs font-bold uppercase bg-primary text-black transition";
                btnP.className = "px-4 py-2 rounded-md text-xs font-bold uppercase text-gray-400 hover:text-white transition";
            }
            
            renderViews();
        }

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const el = document.createElement('div');
            const color = type === 'error' ? 'bg-red-500' : 'bg-green-500';
            const icon = type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle';
            
            el.className = `flex items-center gap-3 px-6 py-4 rounded-xl shadow-2xl text-white font-bold text-sm transform transition-all duration-300 translate-x-full ${color}`;
            el.innerHTML = `<i class="fas ${icon} text-xl"></i> ${msg}`;
            
            container.appendChild(el);
            setTimeout(() => el.classList.remove('translate-x-full'), 10);
            setTimeout(() => {
                el.classList.add('translate-x-full');
                setTimeout(() => el.remove(), 300);
            }, 3000);
        }

        function logout() {
            localStorage.removeItem('access');
            localStorage.removeItem('refresh');
            location.href = '/login/';
        }

        // Запуск
        init();
    </script>
</body>
</html>
